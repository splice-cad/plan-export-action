# Commits rendered outputs back to the repo.
# - Maintains a git history of every render.
# - [skip ci] in the commit message prevents an infinite re-render loop.
# - Diff check skips empty "no changes" commits.
# - concurrency + cancel-in-progress collapses rapid successive pushes to a
#   single completed run, and the retry loop handles races on the commit-back.
name: Render plan

on:
  push:
    paths:
      - 'plans/**'
      - 'splice.yml'
  workflow_dispatch:

concurrency:
  group: render-plan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: splice-cad/plan-export-action@v0

      - name: Commit rendered outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage and commit first so the worktree is clean before any rebase.
          git add rendered/
          if git diff --staged --quiet; then
            echo "No changes to rendered/"
            exit 0
          fi
          git commit -m "chore: update rendered outputs [skip ci]"
          # Retry loop handles concurrent runs racing on the same branch.
          for i in 1 2 3; do
            git fetch origin "${{ github.ref_name }}"
            git rebase "origin/${{ github.ref_name }}" || { git rebase --abort; exit 1; }
            if git push origin "HEAD:${{ github.ref_name }}"; then
              exit 0
            fi
            echo "Push rejected, retrying ($i/3)..."
          done
          echo "Push failed after 3 attempts" >&2
          exit 1
