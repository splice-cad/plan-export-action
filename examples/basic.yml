# Minimal consumer workflow.
# - Renders on push to plans/ or splice.yml
# - Manual dispatch supported
# - Uploads rendered/ as a workflow artifact (ephemeral, ~90 day retention)
name: Render plan

on:
  push:
    paths:
      - 'plans/**'
      - 'splice.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: splice-cad/plan-export-action@v0
      - uses: actions/upload-artifact@v7
        with:
          name: rendered
          path: rendered/
          if-no-files-found: error
