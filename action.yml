name: Splice Design Export
description: Render splice designs (plan or legacy harness) as PDF, PNG, SVG, XLSX, and CSV exports.
author: splice-cad

branding:
  icon: file-text
  color: blue

inputs:
  config:
    description: >-
      Path to splice.yml (relative to the repo root). Defaults to `splice.yml`
      at the repo root. Set this when splice.yml lives alongside the design files
      rather than at root (e.g. `wiring/splice.yml`).
    required: false
    default: ''
  plan-path:
    description: >-
      Path to the design JSON — plan or legacy harness schema (relative to the
      repo root). If omitted, falls back to `design.design-path` (or legacy
      `design.plan-path`) in `splice.yml`.
    required: false
    default: ''
  design-type:
    description: >-
      Design type — `plan` or `harness`. If omitted, falls back to
      `design.type` in `splice.yml` or is auto-detected from the JSON shape
      (`nodes`+`links` → plan; `bom`+`data.mapping` → harness).
    required: false
    default: ''
  output-dir:
    description: >-
      Directory for rendered outputs (relative to the repo root). Defaults to
      `exports.output-dir` in `splice.yml`, or `rendered/` if neither is set.
    required: false
    default: ''
  only:
    description: >-
      Comma-separated export targets. If omitted, falls back to
      `exports.formats` in `splice.yml`, or the default set for the resolved
      design type.
      Plan targets: all-pages-pdf, bom-csv, bom-xlsx, bom-pdf,
      connection-table-xlsx, icd-pdf.
      Harness targets: schematic-pdf, schematic-png, schematic-svg,
      physical-all-pages-pdf, physical-pdf, physical-png, physical-svg,
      bom-csv, bom-xlsx, bom-pdf.
    required: false
    default: ''
  page-mode:
    description: >-
      Which view modes to include in the all-pages PDF. Valid values:
        both (default), layout, schematic
      Falls back to `exports.page-mode` in `splice.yml`.
    required: false
    default: ''

outputs:
  files:
    description: Newline-separated list of rendered file paths.

runs:
  using: docker
  # Floats to the latest v0.x image. Pin to a specific version (e.g. :v0.1.0)
  # if you need reproducible renders across tag bumps.
  image: docker://ghcr.io/splice-cad/plan-export-action:v0
  # Chowns rendered outputs to the runner user so consuming workflows can
  # git rebase / reset / rm them after the action finishes. Runs even on
  # cancellation/timeout where the main entrypoint's cleanup wouldn't fire.
  post-entrypoint: /action/post-cleanup.sh
